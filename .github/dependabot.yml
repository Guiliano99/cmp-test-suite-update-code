version: 2
updates:
  # Dependabot pipeline for dev dependencies (requirements-dev.txt)
  - package-ecosystem: "pip"
    directory: "/"
    requirements-file: "requirements-dev.txt"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "dev-dependencies"
    commit-message:
      prefix: "chore(deps-dev)"
    open-pull-requests-limit: 10
